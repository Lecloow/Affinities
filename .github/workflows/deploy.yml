name: Deploy Frontend
on:
  push:
    branches: [main, archive/website]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout archive
        uses: actions/checkout@v4
        with:
          ref: archive/website
          path: old

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build Affinities website
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          bun install
          bun run build

      - name: Build ancien site
        working-directory: ./old/Website
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          bun install
          bunx vite build --base=/old/

      - name: Assemble
        run: |
          mkdir -p dist
          cp -r frontend/dist/. dist/
          mkdir -p dist/old
          cp -r old/Website/dist/. dist/old/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: lecloow.github.io
